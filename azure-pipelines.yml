trigger: none

pool:
  name: akhileshinfosys

variables:
  serviceConnection: 'akhileshapp'
  resourceGroup: 'tikoo'
  storageAccount: 'tikoostorage789'
  containerName: 'rahulchor'
  tfStateKey: 'st.tf'

stages:

# ---------------- FORMAT ----------------
- stage: FORMAT
  jobs:
  - job: fmt
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform fmt -check -recursive
      displayName: "Format Check"

# ---------------- VALIDATE ----------------
- stage: VALIDATE
  dependsOn: FORMAT
  jobs:
  - job: validate
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'

# ---------------- SECURITY ----------------
- stage: SECURITY
  dependsOn: VALIDATE
  jobs:
  - job: tfsec_scan
    steps:
    - script: |
        curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
        tfsec .
      displayName: "tfsec scan"
      failOnStderr: true

# ---------------- PLAN ----------------
- stage: PLAN
  dependsOn: SECURITY
  jobs:
  - job: plan
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: $(serviceConnection)

# ---------------- APPROVAL ----------------
- stage: APPROVAL
  dependsOn: PLAN
  jobs:
  - job: approval
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Approve deployment"

# ---------------- APPLY ----------------
- stage: APPLY
  dependsOn: APPROVAL
  jobs:
  - job: apply
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: $(serviceConnection)
        args: '-auto-approve'