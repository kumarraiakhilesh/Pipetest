trigger: none

pool:
  name: akhileshinfosys

variables:
  serviceConnection: 'akhileshapp'
  resourceGroup: 'tikoo'
  storageAccount: 'tikoostorage789'
  containerName: 'rahulchor'
  tfStateKey: 'st.tf'

stages:

# ---------------- FORMAT ----------------
- stage: FORMAT
  displayName: "Terraform Format"
  jobs:
  - job: fmt
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform fmt -recursive
      displayName: "Run Terraform Format"


# ---------------- VALIDATE ----------------
- stage: VALIDATE
  displayName: "Init & Validate"
  dependsOn: FORMAT
  jobs:
  - job: validate
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'


# ---------------- SECURITY ----------------
- stage: SECURITY
  displayName: "Security Scan (tfsec)"
  dependsOn: VALIDATE
  jobs:
  - job: tfsec
    steps:
    - task: tfsec@1
      displayName: "Run tfsec scan"
      inputs:
        version: 'v1.26.0'
        args: '--format junit --out tfsec-report.xml'
        dir: '.'

    - task: PublishTestResults@2
      displayName: "Publish tfsec Report"
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'tfsec-report.xml'
        failTaskOnFailedTests: true


# ---------------- PLAN ----------------
- stage: PLAN
  displayName: "Terraform Plan"
  dependsOn: SECURITY
  jobs:
  - job: plan
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: $(serviceConnection)
        commandOptions: '-out=tfplan' # <-- Changed from 'args' to 'commandOptions'

    - task: PublishPipelineArtifact@1
      displayName: "Publish Plan Artifact"
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/tfplan'
        artifact: 'tfplan'


# ---------------- APPROVAL ----------------
- stage: APPROVAL
  displayName: "Manual Approval"
  dependsOn: PLAN
  jobs:
  - job: approval
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Review Terraform Plan and approve deployment"
        timeoutInMinutes: 60


# ---------------- APPLY ----------------
- stage: APPLY
  displayName: "Terraform Apply"
  dependsOn: APPROVAL
  jobs:
  - job: apply
    steps:

    - task: DownloadPipelineArtifact@2
      displayName: "Download Plan Artifact"
      inputs:
        artifact: 'tfplan'
        path: '$(System.DefaultWorkingDirectory)' # <-- Downloads tfplan directly into working directory

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: $(serviceConnection)
        commandOptions: 'tfplan' # <-- Changed from 'args' to 'commandOptions' (and removed redundant -auto-approve since plan files approve themselves)