trigger: none

pool:
  name: akhileshinfosys

variables:
  serviceConnection: 'akhileshapp'
  resourceGroup: 'tikoo'
  storageAccount: 'tikoostorage789'
  containerName: 'rahulchor'
  tfStateKey: 'st.tf'

stages:

# ---------------- FORMAT ----------------
- stage: FORMAT
  displayName: "Terraform Format"
  jobs:
  - job: fmt
    displayName: "Format Check"
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform fmt -recursive
      displayName: "Run Terraform Format"


# ---------------- VALIDATE ----------------
- stage: VALIDATE
  displayName: "Init & Validate"
  dependsOn: FORMAT

  jobs:
  - job: validate
    displayName: "Terraform Validate"
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'


# ---------------- SECURITY ----------------
- stage: SECURITY
  displayName: "Security Scan (tfsec)"
  dependsOn: VALIDATE

  jobs:
  - job: tfsec_scan
    displayName: "Run tfsec"
    steps:
    - task: tfsec@1
      displayName: "Terraform Security Scan"
      inputs:
        version: 'v1.26.0'
        args: '--format junit --out tfsec-report.xml'
        dir: '.'

    - task: PublishTestResults@2
      displayName: "Publish tfsec Report"
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'tfsec-report.xml'
        failTaskOnFailedTests: true


# ---------------- PLAN ----------------
- stage: PLAN
  displayName: "Terraform Plan"
  dependsOn: SECURITY

  jobs:
  - job: plan
    displayName: "Terraform Plan"
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: $(serviceConnection)
        args: '-out=tfplan'

    - task: PublishPipelineArtifact@1
      displayName: "Publish Plan Artifact"
      inputs:
        targetPath: 'tfplan'
        artifact: 'tfplan'


# ---------------- APPROVAL ----------------
- stage: APPROVAL
  displayName: "Manual Approval"
  dependsOn: PLAN

  jobs:
  - job: approval
    displayName: "Approval Gate"
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Review Terraform Plan and approve deployment"
        timeoutInMinutes: 60


# ---------------- APPLY ----------------
- stage: APPLY
  displayName: "Terraform Apply"
  dependsOn: APPROVAL

  jobs:
  - job: apply
    displayName: "Terraform Apply"
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: $(serviceConnection)
        args: '-auto-approve'