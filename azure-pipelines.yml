trigger: none

pool:
  name: akhileshinfosys

variables:
  serviceConnection: 'akhileshapp'
  resourceGroup: 'tikoo'
  storageAccount: 'tikoostorage789'
  containerName: 'rahulchor'
  tfStateKey: 'st.tf'

stages:

# ---------------------------
# 1. FORMAT STAGE
# ---------------------------
- stage: FORMAT
  displayName: "Terraform Format"
  jobs:
  - job: format
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - script: terraform fmt -recursive
      displayName: "Auto Format"

    - script: terraform fmt -check -recursive
      displayName: "Format Check"

# ---------------------------
# 2. VALIDATE + INIT
# ---------------------------
- stage: VALIDATE_INIT
  displayName: "Init & Validate"
  dependsOn: FORMAT
  jobs:
  - job: validate_init
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'

# ---------------------------
# 3. SECURITY SCAN
# ---------------------------
- stage: SECURITY
  displayName: "Security Scan"
  dependsOn: VALIDATE_INIT
  jobs:
  - job: security
    steps:
    - powershell: |
        choco install tfsec -y
        tfsec .
      displayName: "tfsec Scan"

# ---------------------------
# 4. PLAN STAGE
# ---------------------------
- stage: PLAN
  displayName: "Terraform Plan"
  dependsOn: SECURITY
  jobs:
  - job: plan
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: $(serviceConnection)

# ---------------------------
# 5. APPROVAL GATE (ENTERPRISE BEST PRACTICE)
# ---------------------------
- stage: APPROVAL
  displayName: "Manual Approval"
  dependsOn: PLAN
  condition: succeeded()
  jobs:
  - job: approval
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Approve Terraform deployment"
        timeoutInMinutes: 60

# ---------------------------
# 6. APPLY STAGE
# ---------------------------
- stage: APPLY
  displayName: "Terraform Apply"
  dependsOn: APPROVAL
  condition: succeeded()
  jobs:
  - job: apply
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTask@5
      displayName: "Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: $(resourceGroup)
        backendAzureRmStorageAccountName: $(storageAccount)
        backendAzureRmContainerName: $(containerName)
        backendAzureRmKey: $(tfStateKey)

    - task: TerraformTask@5
      displayName: "Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: $(serviceConnection)
        args: '-auto-approve'